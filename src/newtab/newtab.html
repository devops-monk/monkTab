<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MonkTab</title>
  <link rel="stylesheet" href="./newtab.css" />
</head>
<body>

  <!-- Background -->
  <div id="bg" class="bg"></div>
  <div class="overlay"></div>

  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="icon-btn" id="btn-links-toggle" title="Quick Links">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        Links
      </button>
    </div>

    <form id="search-form" class="search-form" autocomplete="off">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search-input" type="text" placeholder="Search the web…" spellcheck="false" />
      <select id="search-engine">
        <option value="google">Google</option>
        <option value="duckduckgo">DuckDuckGo</option>
        <option value="bing">Bing</option>
      </select>
    </form>

    <div class="topbar-right">
      <div id="weather-widget" class="weather hidden">
        <span id="weather-icon">🌤️</span>
        <span id="weather-temp">--°</span>
        <span id="weather-city"></span>
      </div>
      <button class="icon-btn" id="btn-settings" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <!-- Main -->
  <main class="main">
    <div id="clock" class="clock">00:00</div>
    <div id="greeting" class="greeting">Good morning.</div>

    <div class="focus-wrap">
      <label class="focus-label">What is your focus for today?</label>
      <input id="focus-input" class="focus-input" type="text" placeholder="Enter your main goal…" spellcheck="false" maxlength="120" />
    </div>

    <div id="quote-wrap" class="quote-wrap">
      <p id="quote-text" class="quote-text"></p>
      <p id="quote-author" class="quote-author"></p>
    </div>
  </main>

  <!-- Bottom panels -->
  <div class="bottom-panels">

    <!-- Pomodoro -->
    <div id="pomodoro-panel" class="panel pomodoro-panel hidden">
      <div class="pomodoro-tabs">
        <button class="pomo-tab active" data-mode="focus">Focus</button>
        <button class="pomo-tab" data-mode="break">Break</button>
      </div>
      <div id="pomo-timer" class="pomo-timer">25:00</div>
      <div id="pomo-task" class="pomo-task"></div>
      <div class="pomo-controls">
        <button id="pomo-start" class="pomo-btn">Start</button>
        <button id="pomo-reset" class="pomo-btn pomo-btn-ghost">Reset</button>
      </div>
    </div>

    <!-- Todos -->
    <div id="todos-panel" class="panel todos-panel">
      <div class="panel-header">
        <span>Tasks</span>
        <button id="btn-pomo-toggle" class="icon-btn-sm" title="Pomodoro Timer">🍅</button>
      </div>
      <ul id="todo-list" class="todo-list"></ul>
      <form id="todo-form" class="todo-form">
        <input id="todo-input" type="text" placeholder="Add a task…" maxlength="100" />
        <button type="submit">+</button>
      </form>
    </div>

  </div>

  <!-- Quick links panel (slide-in) -->
  <aside id="links-panel" class="links-panel hidden">
    <div class="panel-header">
      <span>Quick Links</span>
      <button id="btn-links-close" class="icon-btn-sm">✕</button>
    </div>
    <ul id="links-list" class="links-list"></ul>
    <form id="link-form" class="link-form">
      <input id="link-label" type="text" placeholder="Label" maxlength="20" />
      <input id="link-url" type="url" placeholder="https://…" />
      <button type="submit">Add</button>
    </form>
  </aside>

  <!-- Settings panel -->
  <aside id="settings-panel" class="settings-panel hidden">
    <div class="panel-header">
      <span>Settings</span>
      <button id="btn-settings-close" class="icon-btn-sm">✕</button>
    </div>
    <div class="settings-body">
      <label class="setting-row">
        Your name
        <input id="set-name" type="text" placeholder="Abhay" maxlength="30" />
      </label>
      <label class="setting-row">
        Search engine
        <select id="set-engine">
          <option value="google">Google</option>
          <option value="duckduckgo">DuckDuckGo</option>
          <option value="bing">Bing</option>
        </select>
      </label>
      <label class="setting-row">
        Theme
        <select id="set-theme">
          <option value="auto">Auto</option>
          <option value="dark">Dark</option>
          <option value="light">Light</option>
        </select>
      </label>
      <div class="setting-toggles">
        <label class="toggle-row"><input type="checkbox" id="set-weather" /> Show weather</label>
        <label class="toggle-row"><input type="checkbox" id="set-quote" /> Show quote</label>
        <label class="toggle-row"><input type="checkbox" id="set-todos" /> Show tasks</label>
        <label class="toggle-row"><input type="checkbox" id="set-links" /> Show quick links</label>
        <label class="toggle-row"><input type="checkbox" id="set-pomodoro" /> Show Pomodoro</label>
      </div>
      <label class="setting-row">
        Unsplash API key <small>(optional, for fresh daily photos)</small>
        <input id="set-unsplash" type="text" placeholder="Paste key…" />
      </label>
    </div>
    <button id="btn-settings-save" class="save-btn">Save Settings</button>
  </aside>

  <script type="module" src="./newtab.ts"></script>
</body>
</html>
