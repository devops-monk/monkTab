<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Main background gradient: deep navy → rich violet -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0d0620"/>
      <stop offset="55%"  stop-color="#3b0f8c"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <!-- Top-right shine -->
    <radialGradient id="shine" cx="78%" cy="16%" r="55%">
      <stop offset="0%"   stop-color="#c4b5fd" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0"/>
    </radialGradient>
    <!-- Bottom-left depth -->
    <radialGradient id="depth" cx="18%" cy="88%" r="50%">
      <stop offset="0%"   stop-color="#1e0a4a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1e0a4a" stop-opacity="0"/>
    </radialGradient>
    <!-- M glow filter -->
    <filter id="mglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Clip to rounded square -->
    <clipPath id="rounded">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <!-- Background -->
    <rect width="512" height="512" fill="url(#bg)"/>
    <!-- Shine overlay -->
    <rect width="512" height="512" fill="url(#shine)"/>
    <!-- Depth overlay -->
    <rect width="512" height="512" fill="url(#depth)"/>
    <!-- Subtle inner ring (focus circle vibe) -->
    <circle cx="256" cy="256" r="195" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.18"/>
    <circle cx="256" cy="256" r="220" fill="none" stroke="#a78bfa" stroke-width="0.8" opacity="0.10"/>
  </g>

  <rect width="512" height="512" rx="112" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.25"/>

  <!-- ── M mark ── -->
  <!-- Glowing duplicate behind for bloom effect -->
  <path filter="url(#mglow)" opacity="0.4"
    d="M 100 370 L 100 148 L 256 272 L 412 148 L 412 370
       L 372 370 L 372 220 L 256 328 L 140 220 L 140 370 Z"
    fill="#c4b5fd"/>

  <!-- Main M — clean geometric filled -->
  <path
    d="M 100 370 L 100 148 L 256 272 L 412 148 L 412 370
       L 372 370 L 372 220 L 256 328 L 140 220 L 140 370 Z"
    fill="white" opacity="0.96"/>

  <!-- Accent dots at the two peaks -->
  <circle cx="100" cy="136" r="20" fill="#a78bfa"/>
  <circle cx="412" cy="136" r="20" fill="#a78bfa"/>

  <!-- Centre valley dot (subtle) -->
  <circle cx="256" cy="340" r="11" fill="#ddd6fe" opacity="0.55"/>
</svg>
