<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>

    <!-- Background: deep violet bloom upper-left -->
    <radialGradient id="bg-bloom" cx="28%" cy="22%" r="70%">
      <stop offset="0%"   stop-color="#3b1280"/>
      <stop offset="45%"  stop-color="#160636"/>
      <stop offset="100%" stop-color="#05000f"/>
    </radialGradient>

    <!-- Warm glow behind M centre -->
    <radialGradient id="m-glow" cx="50%" cy="55%" r="48%">
      <stop offset="0%"   stop-color="#5b21b6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5b21b6" stop-opacity="0"/>
    </radialGradient>

    <!-- Top-right specular -->
    <radialGradient id="spec" cx="80%" cy="8%" r="40%">
      <stop offset="0%"   stop-color="#c4b5fd" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0"/>
    </radialGradient>

    <!-- M gradient: bright white top → soft lavender bottom -->
    <linearGradient id="m-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e9d8ff"/>
    </linearGradient>

    <!-- Dot glow filter (simple, works in ImageMagick) -->
    <filter id="dot-glow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip to rounded square -->
    <clipPath id="frame"><rect width="512" height="512" rx="114"/></clipPath>

  </defs>

  <!-- Background layers -->
  <g clip-path="url(#frame)">
    <rect width="512" height="512" fill="url(#bg-bloom)"/>
    <rect width="512" height="512" fill="url(#m-glow)"/>
    <rect width="512" height="512" fill="url(#spec)"/>

    <!-- Subtle ring decoration -->
    <circle cx="256" cy="256" r="210" fill="none"
      stroke="#7c3aed" stroke-width="1.5" opacity="0.15"/>
    <circle cx="256" cy="256" r="238" fill="none"
      stroke="#7c3aed" stroke-width="0.8" opacity="0.08"/>

    <!-- Purple M shadow/ghost — solid, no filter, slightly offset -->
    <path d="M 92,382 L 92,138 L 256,290 L 420,138 L 420,382
             L 368,382 L 368,228 L 256,346 L 144,228 L 144,382 Z"
      fill="#7c3aed" opacity="0.35" transform="translate(0, 8)"/>

    <!-- White M — clean, no filter, full opacity -->
    <path d="M 92,382 L 92,138 L 256,290 L 420,138 L 420,382
             L 368,382 L 368,228 L 256,346 L 144,228 L 144,382 Z"
      fill="url(#m-fill)"/>

    <!-- Peak accent dots -->
    <!-- Left dot glow -->
    <circle cx="92" cy="125" r="26" fill="#8b5cf6" opacity="0.5"/>
    <circle cx="92" cy="125" r="18" fill="#8b5cf6" opacity="0.8"/>
    <circle cx="92" cy="125" r="14" fill="#ddd6fe"/>

    <!-- Right dot glow -->
    <circle cx="420" cy="125" r="26" fill="#8b5cf6" opacity="0.5"/>
    <circle cx="420" cy="125" r="18" fill="#8b5cf6" opacity="0.8"/>
    <circle cx="420" cy="125" r="14" fill="#ddd6fe"/>

    <!-- Valley dot -->
    <circle cx="256" cy="358" r="7" fill="#c4b5fd" opacity="0.5"/>
  </g>

  <!-- Icon border -->
  <rect width="512" height="512" rx="114" fill="none"
    stroke="#a78bfa" stroke-width="1.5" opacity="0.2"/>

</svg>
