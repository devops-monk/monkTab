<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 560" width="1400" height="560">
  <defs>
    <radialGradient id="bg" cx="22%" cy="20%" r="75%">
      <stop offset="0%"   stop-color="#3b1280"/>
      <stop offset="45%"  stop-color="#160636"/>
      <stop offset="100%" stop-color="#05000f"/>
    </radialGradient>
    <radialGradient id="glow-r" cx="100%" cy="80%" r="55%">
      <stop offset="0%"   stop-color="#2e0f68" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2e0f68" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spec" cx="85%" cy="10%" r="38%">
      <stop offset="0%"   stop-color="#c4b5fd" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0"/>
    </radialGradient>
    <filter id="bloom" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="m-crisp" x="-8%" y="-8%" width="116%" height="116%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dot-glow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="card-glow" x="-10%" y="-15%" width="120%" height="130%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="m-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e9d8ff" stop-opacity="0.93"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="card-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2d1b69" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1a0d40" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="arc-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#a78bfa" stop-opacity="1"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="560" fill="url(#bg)"/>
  <rect width="1400" height="560" fill="url(#glow-r)"/>
  <rect width="1400" height="560" fill="url(#spec)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="280" x2="1400" y2="280" stroke="#a78bfa" stroke-width="0.5" opacity="0.05"/>
  <line x1="700" y1="0" x2="700" y2="560" stroke="#a78bfa" stroke-width="0.5" opacity="0.05"/>

  <!-- Large decorative ring behind the M -->
  <circle cx="230" cy="280" r="210" fill="none"
    stroke="#7c3aed" stroke-width="1.5" opacity="0.1"/>
  <circle cx="230" cy="280" r="185" fill="none"
    stroke="url(#arc-grad)" stroke-width="3"
    stroke-dasharray="880 350"
    stroke-linecap="round"
    opacity="0.22"
    transform="rotate(-110 230 280)"/>

  <!-- Left side: Large M mark -->
  <!-- M scaled ~220px tall, centered at x=230, y=280 -->
  <g transform="translate(75, 100) scale(0.6)">
    <!-- bloom -->
    <path filter="url(#bloom)" opacity="0.4"
      d="M 92,382 L 92,138 L 256,290 L 420,138 L 420,382
         L 368,382 L 368,228 L 256,346 L 144,228 L 144,382 Z"
      fill="#b89dff"/>
    <!-- M -->
    <path filter="url(#m-crisp)"
      d="M 92,382 L 92,138 L 256,290 L 420,138 L 420,382
         L 368,382 L 368,228 L 256,346 L 144,228 L 144,382 Z"
      fill="url(#m-fill)"/>
    <!-- Peak dots -->
    <circle filter="url(#dot-glow)" cx="92"  cy="125" r="26" fill="#8b5cf6" opacity="0.9"/>
    <circle cx="92"  cy="125" r="15" fill="#ddd6fe"/>
    <circle filter="url(#dot-glow)" cx="420" cy="125" r="26" fill="#8b5cf6" opacity="0.9"/>
    <circle cx="420" cy="125" r="15" fill="#ddd6fe"/>
    <!-- Valley dot -->
    <circle cx="256" cy="360" r="10" fill="#c4b5fd" opacity="0.35"/>
  </g>

  <!-- Vertical divider -->
  <line x1="420" y1="60" x2="420" y2="500" stroke="#a78bfa" stroke-width="1" opacity="0.18"/>

  <!-- Right side: Brand + feature cards -->
  <!-- MonkTab wordmark -->
  <text x="466" y="148" font-family="system-ui,-apple-system,sans-serif"
    font-size="72" font-weight="800" letter-spacing="-1.5"
    fill="url(#title-grad)">MonkTab</text>

  <text x="470" y="182" font-family="system-ui,-apple-system,sans-serif"
    font-size="18" font-weight="400" letter-spacing="5"
    fill="#a78bfa">DEVELOPER NEW TAB · CHROME EXTENSION</text>

  <!-- Separator line -->
  <rect x="466" y="198" width="860" height="1.5" fill="#a78bfa" opacity="0.22"/>

  <!-- Tagline -->
  <text x="466" y="235" font-family="system-ui,-apple-system,sans-serif"
    font-size="24" font-weight="300" letter-spacing="0.3"
    fill="#d8b4fe">Your focused workspace. Every new tab.</text>

  <!-- Feature cards row -->
  <!-- Card 1: Pomodoro -->
  <g transform="translate(466, 268)">
    <rect width="180" height="110" rx="12" fill="url(#card-bg)" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.25"/>
    <!-- Clock ring icon -->
    <circle cx="90" cy="38" r="22" fill="none" stroke="#a78bfa" stroke-width="2.5" opacity="0.5"/>
    <circle cx="90" cy="38" r="22" fill="none" stroke="#8b5cf6" stroke-width="2.5"
      stroke-dasharray="100 38" stroke-linecap="round"
      transform="rotate(-90 90 38)"/>
    <line x1="90" y1="38" x2="90" y2="20" stroke="#ddd6fe" stroke-width="2" stroke-linecap="round"/>
    <line x1="90" y1="38" x2="104" y2="38" stroke="#ddd6fe" stroke-width="2" stroke-linecap="round"/>
    <text x="90" y="79" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"
      font-size="13" font-weight="600" fill="white">Pomodoro Timer</text>
    <text x="90" y="96" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"
      font-size="11" fill="#a78bfa">Focus + Break cycles</text>
  </g>

  <!-- Card 2: Sounds -->
  <g transform="translate(660, 268)">
    <rect width="180" height="110" rx="12" fill="url(#card-bg)" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.25"/>
    <!-- Sound wave icon -->
    <g transform="translate(90, 38)">
      <rect x="-28" y="-14" width="8" height="28" rx="4" fill="#8b5cf6" opacity="0.7"/>
      <rect x="-16" y="-20" width="8" height="40" rx="4" fill="#a78bfa"/>
      <rect x="-4"  y="-10" width="8" height="20" rx="4" fill="#8b5cf6" opacity="0.7"/>
      <rect x="8"   y="-24" width="8" height="48" rx="4" fill="#a78bfa"/>
      <rect x="20"  y="-16" width="8" height="32" rx="4" fill="#8b5cf6" opacity="0.7"/>
    </g>
    <text x="90" y="79" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"
      font-size="13" font-weight="600" fill="white">Ambient Sounds</text>
    <text x="90" y="96" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"
      font-size="11" fill="#a78bfa">20+ nature soundscapes</text>
  </g>

  <!-- Card 3: Tasks -->
  <g transform="translate(854, 268)">
    <rect width="180" height="110" rx="12" fill="url(#card-bg)" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.25"/>
    <!-- Task list icon -->
    <g transform="translate(60, 18)">
      <rect x="0" y="0"  width="60" height="8" rx="4" fill="#a78bfa" opacity="0.8"/>
      <rect x="0" y="14" width="48" height="8" rx="4" fill="#a78bfa" opacity="0.6"/>
      <rect x="0" y="28" width="54" height="8" rx="4" fill="#a78bfa" opacity="0.6"/>
      <circle cx="-12" cy="4"  r="5" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
      <circle cx="-12" cy="18" r="5" fill="#8b5cf6"/>
      <path d="M -16,18 L -12,22 L -6,14" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="-12" cy="32" r="5" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
    </g>
    <text x="90" y="79" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"
      font-size="13" font-weight="600" fill="white">Smart Tasks</text>
    <text x="90" y="96" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"
      font-size="11" fill="#a78bfa">Priority · Filter · Focus</text>
  </g>

  <!-- Card 4: Focus Mode -->
  <g transform="translate(1048, 268)">
    <rect width="200" height="110" rx="12" fill="url(#card-bg)" stroke="#34d399" stroke-width="0.8" stroke-opacity="0.35"/>
    <!-- Focus ring icon -->
    <circle cx="100" cy="38" r="24" fill="none" stroke="#374151" stroke-width="3.5"/>
    <circle cx="100" cy="38" r="24" fill="none" stroke="#34d399" stroke-width="3.5"
      stroke-dasharray="120 30" stroke-linecap="round"
      transform="rotate(-90 100 38)"/>
    <text x="100" y="43" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"
      font-size="11" font-weight="600" fill="#34d399">FOCUS</text>
    <text x="100" y="79" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"
      font-size="13" font-weight="600" fill="white">Focus Mode</text>
    <text x="100" y="96" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"
      font-size="11" fill="#34d399">Ring timer · Sound · Tasks</text>
  </g>

  <!-- Bottom feature strip -->
  <rect x="0" y="430" width="1400" height="130" fill="#0a0018" opacity="0.45"/>

  <!-- Bottom features row -->
  <g font-family="system-ui,-apple-system,sans-serif" fill="white">
    <!-- Weather -->
    <g transform="translate(140, 460)">
      <circle cx="0" cy="12" r="5" fill="#60a5fa"/>
      <text x="12" dy="16" font-size="14" fill="#c4b5fd">Weather &amp; World Clocks</text>
    </g>
    <!-- Bookmarks -->
    <g transform="translate(360, 460)">
      <circle cx="0" cy="12" r="5" fill="#60a5fa"/>
      <text x="12" dy="16" font-size="14" fill="#c4b5fd">Quick Bookmarks</text>
    </g>
    <!-- Notes -->
    <g transform="translate(530, 460)">
      <circle cx="0" cy="12" r="5" fill="#60a5fa"/>
      <text x="12" dy="16" font-size="14" fill="#c4b5fd">Scratchpad Notes</text>
    </g>
    <!-- YouTube -->
    <g transform="translate(700, 460)">
      <circle cx="0" cy="12" r="5" fill="#60a5fa"/>
      <text x="12" dy="16" font-size="14" fill="#c4b5fd">YouTube Lo-fi Player</text>
    </g>
    <!-- Daily Photo -->
    <g transform="translate(880, 460)">
      <circle cx="0" cy="12" r="5" fill="#60a5fa"/>
      <text x="12" dy="16" font-size="14" fill="#c4b5fd">Daily Backgrounds</text>
    </g>
  </g>

  <!-- Privacy badge -->
  <g transform="translate(466, 495)">
    <rect width="220" height="36" rx="18" fill="#0f2a1a" stroke="#34d399" stroke-width="1.2"/>
    <circle cx="26" cy="18" r="8" fill="#34d399" opacity="0.2"/>
    <circle cx="26" cy="18" r="5" fill="#34d399"/>
    <text x="42" y="23" font-family="system-ui,-apple-system,sans-serif"
      font-size="13" font-weight="600" fill="#34d399">Zero accounts · 100% private</text>
  </g>

  <!-- Bottom brand -->
  <text x="700" y="540" font-family="system-ui,-apple-system,sans-serif"
    font-size="12" font-weight="500" letter-spacing="2.5"
    fill="#4c2f8a" text-anchor="middle">DEVOPS-MONK · MONKTAB</text>
</svg>
